networks:
  civitro-network:
    driver: bridge

volumes:
  postgres-data:
  mongodb-data:
  redis-data:
  redpanda-data:
  opensearch-data:
  timescaledb-data:
  minio-data:
  ollama-data:

services:
  # ── PostgreSQL with PostGIS ──────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: civitro-postgres
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: civitro
      POSTGRES_USER: civitro
      POSTGRES_PASSWORD: civitro_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civitro -d civitro"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - civitro-network

  # ── MongoDB ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: civitro-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - civitro-network

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: civitro-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - civitro-network

  # ── Redpanda (Kafka-compatible) ─────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: civitro-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:19092
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
    ports:
      - "19092:9092"
      - "18081:18081"
      - "18082:18082"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - civitro-network

  # ── OpenSearch ───────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2
    container_name: civitro-opensearch
    restart: unless-stopped
    ports:
      - "19200:9200"
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - civitro-network

  # ── OpenSearch Dashboards ────────────────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2
    container_name: civitro-opensearch-dashboards
    restart: unless-stopped
    ports:
      - "15601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - civitro-network

  # ── TimescaleDB ─────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: civitro-timescaledb
    restart: unless-stopped
    ports:
      - "15433:5432"
    environment:
      POSTGRES_DB: civitro_ts
      POSTGRES_USER: civitro
      POSTGRES_PASSWORD: civitro_dev
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civitro -d civitro_ts"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - civitro-network

  # ── MinIO (S3-compatible storage) ───────────────────────────
  minio:
    image: minio/minio:latest
    container_name: civitro-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - civitro-network

  # ── Ollama (local LLM inference) ────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: civitro-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - civitro-network

  # ── Jaeger (distributed tracing) ────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: civitro-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "14268:14268"
      - "14317:4317"
      - "14318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:16686/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - civitro-network

  # ── Redpanda Console ────────────────────────────────────────
  redpanda-console:
    image: redpandadata/console:latest
    container_name: civitro-redpanda-console
    restart: unless-stopped
    ports:
      - "18888:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
      SCHEMA_REGISTRY_URL: "http://redpanda:8081"
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - civitro-network

  # ── Nginx API Gateway ──────────────────────────────────────
  nginx:
    build: ./nginx
    container_name: civitro-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      identity:
        condition: service_healthy
      issues:
        condition: service_healthy
      ledger:
        condition: service_healthy
      rating:
        condition: service_healthy
      notifications:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - civitro-network

