  advertising:
    build:
      context: ../ai
      dockerfile: services/advertising/Dockerfile
    container_name: civitro-advertising
    restart: unless-stopped
    profiles: ["wave2"]
    ports:
      - "8020:8020"
    environment:
      - APP_ENV=docker
    volumes:
      - ../config:/app/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8020/health\")' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - civitro-network

  # ── Service 22: Community Action Engine ──────────────────────
  community-action:
    build:
      context: ../backend
      dockerfile: services/community-action/Dockerfile
    container_name: civitro-community-action
    restart: unless-stopped
    profiles: ["wave3"]
    ports:
      - "8022:8022"
    environment:
      - APP_ENV=docker
    volumes:
      - ../config:/app/config:ro
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8022/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - civitro-network

  # ── Service 23: Pattern Detection Engine ─────────────────────
  pattern-detection:
    build:
      context: ../ai
      dockerfile: services/pattern-detection/Dockerfile
    container_name: civitro-pattern-detection
    restart: unless-stopped
    profiles: ["wave3"]
    ports:
      - "8023:8023"
    environment:
      - APP_ENV=docker
    volumes:
      - ../config:/app/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8023/health\")' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - civitro-network
