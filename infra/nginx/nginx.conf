# ============================================================================
# Civitro API Gateway - Nginx Configuration
# Routes requests to backend microservices running on the host machine.
# ============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Request size limit (10 MB for photo uploads) ─────────────
    client_max_body_size 10m;

    # ── Proxy defaults ───────────────────────────────────────────
    proxy_connect_timeout 30s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # ── Upstream blocks ──────────────────────────────────────────
    upstream identity {
        server host.docker.internal:8001;
    }

    upstream geospatial {
        server host.docker.internal:8002;
    }

    upstream registry {
        server host.docker.internal:8003;
    }

    upstream voices {
        server host.docker.internal:8004;
    }

    upstream issues {
        server host.docker.internal:8005;
    }

    upstream ledger {
        server host.docker.internal:8006;
    }

    upstream rating {
        server host.docker.internal:8007;
    }

    upstream classification {
        server host.docker.internal:8008;
    }

    upstream sentiment {
        server host.docker.internal:8009;
    }

    upstream promises {
        server host.docker.internal:8010;
    }

    upstream chi {
        server host.docker.internal:8011;
    }

    upstream reputation {
        server host.docker.internal:8012;
    }

    upstream polls {
        server host.docker.internal:8013;
    }

    upstream messaging {
        server host.docker.internal:8014;
    }

    upstream search {
        server host.docker.internal:8015;
    }

    upstream datamine {
        server host.docker.internal:8016;
    }

    upstream notifications {
        server host.docker.internal:8017;
    }

    upstream admin {
        server host.docker.internal:8018;
    }

    upstream party {
        server host.docker.internal:8019;
    }

    upstream advertising {
        server host.docker.internal:8020;
    }

    # ── Server ───────────────────────────────────────────────────
    server {
        listen 8080;
        server_name _;

        # ── CORS headers (allow all origins for local dev) ───────
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Max-Age       "3600" always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── Health check ─────────────────────────────────────────
        location = /health {
            access_log off;
            return 200 '{"status":"ok"}';
        }

        # ── Identity (auth) ─────────────────────────────────────
        location /api/v1/auth/ {
            proxy_pass http://identity;
        }

        # ── Geospatial ──────────────────────────────────────────
        location /api/v1/geo/ {
            proxy_pass http://geospatial;
        }

        # ── Registry ────────────────────────────────────────────
        location /api/v1/registry/ {
            proxy_pass http://registry;
        }

        # ── Voices ──────────────────────────────────────────────
        location /api/v1/voices/ {
            proxy_pass http://voices;
        }

        # ── Issues ──────────────────────────────────────────────
        location /api/v1/issues/ {
            proxy_pass http://issues;
        }

        # ── Ledger ──────────────────────────────────────────────
        location /api/v1/ledger/ {
            proxy_pass http://ledger;
        }

        # ── Rating ──────────────────────────────────────────────
        location /api/v1/ratings/ {
            proxy_pass http://rating;
        }

        # ── Classification (Python) ─────────────────────────────
        location /api/v1/classify/ {
            proxy_pass http://classification;
        }

        # ── Sentiment (Python) ──────────────────────────────────
        location /api/v1/sentiment/ {
            proxy_pass http://sentiment;
        }

        # ── Promises (Python) ───────────────────────────────────
        location /api/v1/promises/ {
            proxy_pass http://promises;
        }

        # ── CHI (Python) ────────────────────────────────────────
        location /api/v1/chi/ {
            proxy_pass http://chi;
        }

        # ── Reputation ──────────────────────────────────────────
        location /api/v1/reputation/ {
            proxy_pass http://reputation;
        }

        # ── Polls ───────────────────────────────────────────────
        location /api/v1/polls/ {
            proxy_pass http://polls;
        }

        # ── Messaging (WebSocket upgrade for /ws) ───────────────
        location /api/v1/messages/ws {
            proxy_pass http://messaging;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /api/v1/messages/ {
            proxy_pass http://messaging;
        }

        # ── Search ──────────────────────────────────────────────
        location /api/v1/search/ {
            proxy_pass http://search;
        }

        # ── Datamine (Python) ───────────────────────────────────
        location /api/v1/datamine/ {
            proxy_pass http://datamine;
        }

        # ── Notifications ───────────────────────────────────────
        location /api/v1/notifications/ {
            proxy_pass http://notifications;
        }

        # ── Admin ───────────────────────────────────────────────
        location /api/v1/admin/ {
            proxy_pass http://admin;
        }

        # ── Party ───────────────────────────────────────────────
        location /api/v1/party/ {
            proxy_pass http://party;
        }

        # ── Advertising (Python) ────────────────────────────────
        location /api/v1/ads/ {
            proxy_pass http://advertising;
        }
    }
}
