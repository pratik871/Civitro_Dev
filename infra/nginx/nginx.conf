# ============================================================================
# Civitro API Gateway - Nginx Configuration
# All services route to Docker container names.
# ============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Request size limit (10 MB for photo uploads) ─────────────
    client_max_body_size 10m;

    # ── Proxy defaults ───────────────────────────────────────────
    proxy_connect_timeout 30s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # ── Server ───────────────────────────────────────────────────
    server {
        listen 8080;
        server_name _;

        # Docker internal DNS — re-resolve on every request so rebuilt
        # containers with new IPs are picked up without nginx reload.
        resolver 127.0.0.11 valid=10s;

        # ── CORS headers (allow all origins for local dev) ───────
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, Accept-Language" always;
        add_header Access-Control-Max-Age       "3600" always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── Health check ─────────────────────────────────────────
        location = /health {
            access_log off;
            return 200 '{"status":"ok"}';
        }

        # ── Web app (share pages, .well-known, static assets) ────
        location /share/ {
            set $upstream_web web:3000;
            proxy_pass http://$upstream_web;
        }

        location /_next/ {
            set $upstream_web_next web:3000;
            proxy_pass http://$upstream_web_next;
        }

        location /.well-known/ {
            set $upstream_web_wk web:3000;
            proxy_pass http://$upstream_web_wk;
        }

        # ── Media files (MinIO) ────────────────────────────────
        location /media/ {
            proxy_pass http://minio:9000/civitro-media/;
        }

        # ── Identity (auth) ─────────────────────────────────────
        location /api/v1/auth {
            set $upstream_identity identity:8001;
            proxy_pass http://$upstream_identity;
        }

        # ── Governance Chain (identity service) ────────────────
        location /api/v1/governance {
            set $upstream_identity identity:8001;
            proxy_pass http://$upstream_identity;
        }

        # ── Ward Mood (identity service) ───────────────────────
        location /api/v1/ward-mood {
            set $upstream_identity identity:8001;
            proxy_pass http://$upstream_identity;
        }

        # ── Geospatial ──────────────────────────────────────────
        location /api/v1/geo {
            set $upstream_geospatial geospatial:8002;
            proxy_pass http://$upstream_geospatial;
        }

        # ── Registry ────────────────────────────────────────────
        location /api/v1/registry {
            set $upstream_registry registry:8003;
            proxy_pass http://$upstream_registry;
        }
        location /api/v1/representatives {
            set $upstream_registry2 registry:8003;
            proxy_pass http://$upstream_registry2;
        }

        # ── Community Action Engine ────────────────────────────
        location /api/v1/actions {
            set $upstream_actions community-action:8022;
            proxy_pass http://$upstream_actions;
        }

        # ── Pattern Detection ──────────────────────────────────
        location /api/v1/patterns {
            set $upstream_patterns pattern-detection:8023;
            proxy_pass http://$upstream_patterns;
        }

        # ── Voices ──────────────────────────────────────────────
        location /api/v1/voices {
            set $upstream_voices voices:8004;
            proxy_pass http://$upstream_voices;
        }

        # ── Issues ──────────────────────────────────────────────
        location /api/v1/issues {
            set $upstream_issues issues:8005;
            proxy_pass http://$upstream_issues;
        }

        # ── Ledger ──────────────────────────────────────────────
        location /api/v1/ledger {
            set $upstream_ledger ledger:8006;
            proxy_pass http://$upstream_ledger;
        }

        # ── Rating ──────────────────────────────────────────────
        location /api/v1/rating {
            set $upstream_rating rating:8007;
            proxy_pass http://$upstream_rating;
        }

        location /api/v1/ratings {
            set $upstream_ratings rating:8007;
            proxy_pass http://$upstream_ratings;
        }

        # ── Classification (Python) ─────────────────────────────
        location /api/v1/classify {
            set $upstream_classification classification:8008;
            proxy_pass http://$upstream_classification;
        }

        # ── Sentiment (Python) ──────────────────────────────────
        location /api/v1/sentiment {
            set $upstream_sentiment sentiment:8009;
            proxy_pass http://$upstream_sentiment;
        }

        # ── Promises (Python) ───────────────────────────────────
        location /api/v1/promises {
            set $upstream_promises identity:8001;
            proxy_pass http://$upstream_promises;
        }

        # ── CHI (Python) ────────────────────────────────────────
        location /api/v1/chi {
            set $upstream_chi chi:8011;
            proxy_pass http://$upstream_chi;
        }

        # ── Reputation ──────────────────────────────────────────
        location /api/v1/reputation {
            set $upstream_reputation reputation:8012;
            proxy_pass http://$upstream_reputation;
        }

        # ── Polls ───────────────────────────────────────────────
        location /api/v1/polls {
            set $upstream_polls polls:8013;
            proxy_pass http://$upstream_polls;
        }

        # ── Messaging (WebSocket upgrade for /ws) ───────────────
        location /api/v1/messages/ws {
            set $upstream_messaging_ws messaging:8014;
            proxy_pass http://$upstream_messaging_ws;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /api/v1/messages {
            set $upstream_messaging messaging:8014;
            proxy_pass http://$upstream_messaging;
        }

        # ── Conversations (Messaging service) ─────────────────────
        location /api/v1/conversations {
            set $upstream_conversations messaging:8014;
            proxy_pass http://$upstream_conversations;
        }

        # ── Search ──────────────────────────────────────────────
        location /api/v1/search {
            set $upstream_search search:8015;
            proxy_pass http://$upstream_search;
        }

        # ── Datamine (Python) ───────────────────────────────────
        location /api/v1/datamine {
            set $upstream_datamine datamine:8016;
            proxy_pass http://$upstream_datamine;
        }

        # ── Notifications ───────────────────────────────────────
        location /api/v1/notifications {
            set $upstream_notifications notifications:8017;
            proxy_pass http://$upstream_notifications;
        }

        # ── Admin ───────────────────────────────────────────────
        location /api/v1/admin {
            set $upstream_admin admin:8018;
            proxy_pass http://$upstream_admin;
        }

        # ── Party ───────────────────────────────────────────────
        location /api/v1/party {
            set $upstream_party party:8019;
            proxy_pass http://$upstream_party;
        }

        # ── Advertising (Python) ────────────────────────────────
        location /api/v1/ads {
            set $upstream_advertising advertising:8020;
            proxy_pass http://$upstream_advertising;
        }

        # ── Translation (Python) ──────────────────────────────
        location /api/v1/translate {
            set $upstream_translation translation:8021;
            proxy_pass http://$upstream_translation;
        }
    }
}
