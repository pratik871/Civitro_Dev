<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civitro — Investor Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --saffron: #FF6B35;
    --saffron-light: #FF8F5E;
    --saffron-dark: #E55A28;
    --navy: #0B1426;
    --navy-light: #1A2744;
    --bg: #FFFCF8;
    --bg-card: #FFFFFF;
    --text-primary: #0B1426;
    --text-secondary: #5A6678;
    --text-muted: #8E99A8;
    --border: #E8ECF0;
    --success: #22C55E;
    --success-bg: #ECFDF5;
    --warning: #F59E0B;
    --warning-bg: #FFFBEB;
    --danger: #EF4444;
    --info: #3B82F6;
    --info-bg: #EFF6FF;
    --purple: #8B5CF6;
    --shadow-sm: 0 1px 2px rgba(11,20,38,0.05);
    --shadow-md: 0 4px 12px rgba(11,20,38,0.08);
    --shadow-lg: 0 8px 30px rgba(11,20,38,0.12);
    --shadow-xl: 0 20px 60px rgba(11,20,38,0.15);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --radius-full: 9999px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0B1426 0%, #1a2744 50%, #0B1426 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--text-primary);
    overflow-x: hidden;
  }

  /* Investor Banner */
  .investor-banner {
    width: 100%;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    border-bottom: 2px solid var(--saffron);
    position: relative;
    z-index: 100;
  }

  .investor-banner::before {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--saffron), var(--saffron-light), var(--saffron), transparent);
  }

  .banner-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .banner-logo-icon {
    width: 32px;
    height: 32px;
    background: var(--saffron);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    color: white;
    font-size: 18px;
  }

  .banner-title {
    color: white;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .banner-subtitle {
    color: var(--saffron);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .banner-metrics {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .banner-metric {
    text-align: center;
  }

  .banner-metric-value {
    color: var(--saffron);
    font-size: 16px;
    font-weight: 700;
  }

  .banner-metric-label {
    color: rgba(255,255,255,0.6);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .auto-demo-btn {
    background: linear-gradient(135deg, var(--saffron), var(--saffron-dark));
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: var(--radius-full);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .auto-demo-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 15px rgba(255,107,53,0.4);
  }

  .auto-demo-btn.active {
    background: linear-gradient(135deg, var(--success), #16A34A);
    animation: pulse-btn 2s infinite;
  }

  @keyframes pulse-btn {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
  }

  /* Phone Frame */
  .phone-container {
    padding: 30px 20px 20px;
    display: flex;
    justify-content: center;
    flex: 1;
  }

  .phone-frame {
    width: 393px;
    height: 852px;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 0 0 10px #1a1a2e, 0 0 0 12px #2d2d44, var(--shadow-xl), 0 40px 80px rgba(0,0,0,0.3);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .phone-notch {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 34px;
    background: #000;
    border-radius: 0 0 20px 20px;
    z-index: 50;
  }

  .phone-notch::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 10px;
    height: 10px;
    background: #1a1a2e;
    border-radius: 50%;
  }

  .status-bar {
    height: 54px;
    padding: 14px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg);
    position: relative;
    z-index: 40;
    flex-shrink: 0;
  }

  .status-time {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .status-icons {
    display: flex;
    gap: 5px;
    align-items: center;
    font-size: 12px;
    color: var(--text-primary);
  }

  /* Screen Content */
  .screen-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .screen-content::-webkit-scrollbar { width: 0; }

  /* Bottom Tab Bar */
  .tab-bar {
    height: 80px;
    background: white;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-around;
    padding-top: 8px;
    flex-shrink: 0;
    position: relative;
  }

  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    padding: 4px 12px;
    border: none;
    background: none;
    font-family: 'Inter', sans-serif;
  }

  .tab-icon {
    font-size: 22px;
    transition: transform 0.2s ease;
  }

  .tab-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    transition: color 0.2s ease;
  }

  .tab-item.active .tab-label { color: var(--saffron); font-weight: 600; }
  .tab-item.active .tab-icon { transform: scale(1.1); }

  .tab-fab {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--saffron), var(--saffron-dark));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: -20px;
    box-shadow: 0 4px 20px rgba(255,107,53,0.4);
    cursor: pointer;
    transition: all 0.3s ease;
    border: 3px solid white;
    font-size: 24px;
    color: white;
  }

  .tab-fab:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 25px rgba(255,107,53,0.5);
  }

  /* Language Switcher */
  .lang-switcher {
    position: fixed;
    right: calc(50% - 215px);
    top: 200px;
    z-index: 200;
  }

  .lang-fab {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--navy), var(--navy-light));
    color: white;
    border: 2px solid var(--saffron);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    box-shadow: var(--shadow-lg);
    transition: all 0.3s ease;
    font-family: 'Inter', sans-serif;
  }

  .lang-fab:hover { transform: scale(1.1); }

  .lang-menu {
    position: absolute;
    right: 0;
    top: 52px;
    background: white;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-xl);
    overflow: hidden;
    min-width: 160px;
    border: 1px solid var(--border);
  }

  .lang-option {
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    background: none;
    width: 100%;
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
  }

  .lang-option:hover { background: #FFF5EE; }
  .lang-option.active { background: #FFF0E6; color: var(--saffron); font-weight: 600; }

  /* Cards */
  .card {
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 16px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
  }

  .card-elevated {
    box-shadow: var(--shadow-md);
  }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: var(--radius-full);
    font-size: 11px;
    font-weight: 600;
    gap: 4px;
  }

  .badge-success { background: var(--success-bg); color: var(--success); }
  .badge-warning { background: var(--warning-bg); color: var(--warning); }
  .badge-info { background: var(--info-bg); color: var(--info); }
  .badge-danger { background: #FEF2F2; color: var(--danger); }
  .badge-saffron { background: #FFF5EE; color: var(--saffron); }
  .badge-purple { background: #F5F3FF; color: var(--purple); }

  /* Progress Bar */
  .progress-bar {
    height: 8px;
    background: #F1F5F9;
    border-radius: var(--radius-full);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: var(--radius-full);
    transition: width 1s ease;
    background: linear-gradient(90deg, var(--saffron), var(--saffron-light));
  }

  /* Button */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: var(--radius-full);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    border: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--saffron), var(--saffron-dark));
    color: white;
  }
  .btn-primary:hover { box-shadow: 0 4px 15px rgba(255,107,53,0.3); transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-primary);
  }
  .btn-outline:hover { border-color: var(--saffron); color: var(--saffron); }

  .btn-sm { padding: 6px 14px; font-size: 12px; }

  /* Section */
  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-title .see-all {
    font-size: 13px;
    font-weight: 500;
    color: var(--saffron);
    cursor: pointer;
  }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes shimmer {
    0% { background-position: -200px 0; }
    100% { background-position: 200px 0; }
  }

  @keyframes confettiDrop {
    0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
    100% { transform: translateY(600px) rotate(720deg); opacity: 0; }
  }

  @keyframes ringDraw {
    from { stroke-dashoffset: 283; }
  }

  .animate-in {
    animation: fadeInUp 0.5s ease both;
  }

  .animate-delay-1 { animation-delay: 0.1s; }
  .animate-delay-2 { animation-delay: 0.2s; }
  .animate-delay-3 { animation-delay: 0.3s; }
  .animate-delay-4 { animation-delay: 0.4s; }
  .animate-delay-5 { animation-delay: 0.5s; }

  /* Footer */
  .investor-footer {
    width: 100%;
    text-align: center;
    padding: 20px;
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    font-weight: 500;
  }

  .investor-footer .tagline {
    color: var(--saffron);
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  /* Civic Score Ring */
  .civic-ring-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .civic-ring svg {
    transform: rotate(-90deg);
    filter: drop-shadow(0 2px 8px rgba(255,107,53,0.2));
  }

  .civic-ring-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .civic-ring-score {
    font-size: 28px;
    font-weight: 800;
    color: var(--saffron);
    line-height: 1;
  }

  .civic-ring-label {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 500;
    margin-top: 2px;
  }

  /* Quick Actions */
  .quick-actions {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .quick-action {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 12px 4px;
    border-radius: var(--radius-md);
    background: white;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .quick-action:hover {
    border-color: var(--saffron);
    box-shadow: 0 2px 12px rgba(255,107,53,0.1);
    transform: translateY(-2px);
  }

  .quick-action-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .quick-action-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.2;
  }

  /* Issue card */
  .issue-card {
    display: flex;
    gap: 12px;
    padding: 12px;
    background: white;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .issue-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }

  .issue-thumb {
    width: 56px;
    height: 56px;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  /* Representative card */
  .rep-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    background: white;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    transition: all 0.2s ease;
    cursor: pointer;
  }

  .rep-card:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--saffron);
  }

  .rep-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .rep-tier {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--navy);
    color: white;
  }

  /* Stars */
  .stars {
    color: #F59E0B;
    font-size: 12px;
    letter-spacing: 1px;
  }

  /* Voice card */
  .voice-card {
    padding: 14px;
    background: white;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    transition: all 0.2s ease;
  }

  .voice-card:hover {
    box-shadow: var(--shadow-md);
  }

  /* Poll option */
  .poll-option {
    padding: 12px 16px;
    border-radius: var(--radius-md);
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .poll-option:hover { border-color: var(--saffron); }

  .poll-option.selected { border-color: var(--saffron); background: #FFF5EE; }

  .poll-fill {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    background: linear-gradient(90deg, rgba(255,107,53,0.08), rgba(255,107,53,0.03));
    border-radius: var(--radius-md);
    transition: width 1s ease;
  }

  /* Map placeholder */
  .map-container {
    width: 100%;
    height: 400px;
    background: linear-gradient(135deg, #e8f0fe 0%, #d4e4fc 100%);
    border-radius: var(--radius-md);
    position: relative;
    overflow: hidden;
  }

  .map-dot {
    position: absolute;
    border-radius: 50%;
    animation: mapPulse 2s infinite;
  }

  @keyframes mapPulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.5); opacity: 0.4; }
  }

  /* Confetti */
  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 8px;
    animation: confettiDrop 2s ease-in forwards;
  }

  /* Screen transitions */
  .screen-wrapper {
    animation: fadeIn 0.3s ease;
  }

  /* Responsive */
  @media (max-width: 500px) {
    .phone-frame {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      box-shadow: none;
    }
    .phone-notch { display: none; }
    .phone-container { padding: 0; }
    .investor-banner { padding: 10px 16px; gap: 20px; }
    .banner-metrics { gap: 16px; }
    .lang-switcher { right: 10px; top: 80px; }
    .investor-footer { display: none; }
  }

  /* Scrollbar for desktop */
  @media (min-width: 501px) {
    .screen-content::-webkit-scrollbar { width: 3px; }
    .screen-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
  }

  /* Promise tracker status bar */
  .promise-status-bar {
    display: flex;
    gap: 2px;
    margin: 8px 0;
  }

  .promise-status-segment {
    height: 6px;
    flex: 1;
    border-radius: 3px;
    background: #E8ECF0;
    transition: background 0.5s ease;
  }

  .promise-status-segment.filled { background: var(--saffron); }
  .promise-status-segment.filled-green { background: var(--success); }

  /* Escalation timeline */
  .escalation-line {
    position: absolute;
    left: 23px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }

  /* Pattern alert */
  .pattern-alert {
    background: linear-gradient(135deg, #FFF7ED, #FFEDD5);
    border: 1px solid #FDBA74;
    border-radius: var(--radius-md);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* Mood gauge */
  .mood-gauge {
    height: 8px;
    background: linear-gradient(90deg, #EF4444, #F59E0B, #22C55E);
    border-radius: var(--radius-full);
    position: relative;
  }

  .mood-indicator {
    position: absolute;
    top: -4px;
    width: 16px;
    height: 16px;
    background: white;
    border: 3px solid var(--success);
    border-radius: 50%;
    transform: translateX(-50%);
    box-shadow: var(--shadow-sm);
    transition: left 0.5s ease;
  }

  /* Profile avatar */
  .profile-avatar-large {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--saffron), var(--saffron-dark));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: white;
    font-weight: 700;
    box-shadow: 0 4px 20px rgba(255,107,53,0.3);
  }

  /* Steps indicator */
  .steps-indicator {
    display: flex;
    align-items: center;
    gap: 0;
    justify-content: center;
    margin: 16px 0;
  }

  .step-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    transition: all 0.3s ease;
  }

  .step-dot.active {
    background: var(--saffron);
    color: white;
    box-shadow: 0 2px 10px rgba(255,107,53,0.3);
  }

  .step-dot.completed {
    background: var(--success);
    color: white;
  }

  .step-dot.pending {

function CivicScoreRing({ score = 72 }) {
  const circumference = 2 * Math.PI * 45;
  const offset = circumference - (score / 100) * circumference;
  return (
    <div className="civic-ring-container" style={{ width: 120, height: 120 }}>
      <div className="civic-ring" style={{ position: 'relative' }}>
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="45" fill="none" stroke="#F1F5F9" strokeWidth="10" />
          <circle cx="60" cy="60" r="45" fill="none" stroke="url(#saffronGrad)" strokeWidth="10"
            strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={offset}
            style={{ animation: 'ringDraw 1.5s ease forwards' }} />
          <defs>
            <linearGradient id="saffronGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stopColor="#FF6B35" />
              <stop offset="100%" stopColor="#FF8F5E" />
            </linearGradient>
          </defs>
        </svg>
        <div className="civic-ring-text">
          <div className="civic-ring-score">{score}</div>
          <div className="civic-ring-label">/100</div>
        </div>
      </div>
    </div>
  );
}

function StatusBadge({ status, t }) {
  const config = {
    'Work Started': { cls: 'badge-info', label: t.workStarted },
    'Assigned': { cls: 'badge-warning', label: t.assigned },
    'Reported': { cls: 'badge-saffron', label: t.reported },
    'Resolved': { cls: 'badge-success', label: t.resolved2 },
    'Acknowledged': { cls: 'badge-purple', label: t.acknowledged },
  };
  const c = config[status] || { cls: 'badge-info', label: status };
  return <span className={`badge ${c.cls}`}>{c.label}</span>;
}

function ConfettiAnimation() {
  const colors = ['#FF6B35', '#22C55E', '#3B82F6', '#F59E0B', '#8B5CF6', '#EF4444'];
  const pieces = Array.from({ length: 30 }, (_, i) => ({
    id: i,
    left: Math.random() * 100,
    color: colors[i % colors.length],
    delay: Math.random() * 0.5,
    duration: 1.5 + Math.random() * 1,
    rotation: Math.random() * 360,
    size: 6 + Math.random() * 6,
  }));
  return (
    <div style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, pointerEvents: 'none', overflow: 'hidden', zIndex: 10 }}>
      {pieces.map(p => (
        <div key={p.id} className="confetti-piece" style={{
          left: `${p.left}%`, top: '-10px',
          width: p.size, height: p.size,
          background: p.color,
          borderRadius: Math.random() > 0.5 ? '50%' : '2px',
          animationDelay: `${p.delay}s`,
          animationDuration: `${p.duration}s`,
          transform: `rotate(${p.rotation}deg)`,
        }} />
      ))}
    </div>
  );
}

function App() {
  const [lang, setLang] = useState('en');
  const [screen, setScreen] = useState(SCREENS.HOME);
  const [langOpen, setLangOpen] = useState(false);
  const [autoDemo, setAutoDemo] = useState(false);
  const autoDemoRef = useRef(null);
  const autoDemoIdx = useRef(0);

  const t = translations[lang];

  // Auto demo
  useEffect(() => {
    if (autoDemo) {
      autoDemoIdx.current = 0;
      autoDemoRef.current = setInterval(() => {
        autoDemoIdx.current = (autoDemoIdx.current + 1) % AUTO_DEMO_SEQUENCE.length;
        setScreen(AUTO_DEMO_SEQUENCE[autoDemoIdx.current]);
      }, 4000);
    } else {
      clearInterval(autoDemoRef.current);
    }
    return () => clearInterval(autoDemoRef.current);
  }, [autoDemo]);

  const getTabScreen = (tab) => {
    const map = { home: SCREENS.HOME, report: SCREENS.REPORT, leaders: SCREENS.LEADERS, map: SCREENS.MAP, trending: SCREENS.VOICES };
    return map[tab];
  };

  const isTabActive = (tab) => {
    const map = { home: [SCREENS.HOME], report: [SCREENS.REPORT], leaders: [SCREENS.LEADERS, SCREENS.PROMISES], map: [SCREENS.MAP], trending: [SCREENS.VOICES, SCREENS.POLLS, SCREENS.ACTIONS] };
    return map[tab]?.includes(screen);
  };

  // Sub-navigation for screens not in tab bar
  const renderScreen = () => {
    switch (screen) {
      case SCREENS.HOME: return <HomeScreen t={t} setScreen={setScreen} />;
      case SCREENS.REPORT: return <ReportScreen t={t} setScreen={setScreen} />;

      case SCREENS.PROFILE: return <ProfileScreen t={t} />;

          <div className="banner-metric">

            {/* Center FAB */}
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
              <div className="tab-fab" onClick={() => setScreen(SCREENS.REPORT)}>+</div>
              <span className="tab-label" style={{ marginTop: 4, color: isTabActive('report') ? 'var(--saffron)' : 'var(--text-muted)', fontWeight: isTabActive('report') ? 600 : 500 }}>{t.report}</span>
            </div>

            {[
              { key: 'map', icon: '🗺️', label: t.map },
              { key: 'trending', icon: '🔥', label: t.trending },
            ].map(tab => (
              <button key={tab.key} className={`tab-item ${isTabActive(tab.key) ? 'active' : ''}`}
                onClick={() => setScreen(getTabScreen(tab.key))}>
                <span className="tab-icon">{tab.icon}</span>
                <span className="tab-label">{tab.label}</span>
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Profile access via tapping avatar on Home screen - adding a floating profile button */}
      <div style={{ position: 'fixed', left: 'calc(50% - 215px)', top: 200, zIndex: 200 }}>
        <button onClick={() => setScreen(SCREENS.PROFILE)}
          style={{ width: 44, height: 44, borderRadius: '50%', background: 'linear-gradient(135deg, var(--saffron), var(--saffron-dark))', color: 'white', border: '2px solid white', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', fontSize: 18, fontWeight: 700, boxShadow: 'var(--shadow-lg)', transition: 'all 0.3s ease', fontFamily: 'Inter, sans-serif' }}>
          PS
        </button>
      </div>

      {/* Footer */}
      <div className="investor-footer">
        <div className="tagline">Democracy. You Shape.&trade;</div>
        <div>&copy; 2026 Civitro. All rights reserved. | contact@civitro.org</div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
