<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civitro — Civic Intelligence Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --saffron:#FF6B35;--saffron-glow:rgba(255,107,53,0.15);--saffron-light:#FFF4EE;--saffron-mid:#FFE0D0;
  --navy:#0B1426;--navy-mid:#1A2D4A;--navy-light:#243B5C;
  --white:#FFFFFF;--cream:#FFFCF8;--warm-bg:#FBF8F4;
  --green:#059669;--green-light:#ECFDF5;--green-glow:rgba(5,150,105,0.12);
  --red:#DC2626;--red-light:#FEF2F2;
  --amber:#D97706;--amber-light:#FFFBEB;
  --blue:#2563EB;--blue-light:#EFF6FF;
  --purple:#7C3AED;--purple-light:#F5F3FF;
  --teal:#0D9488;--teal-light:#F0FDFA;
  --text:#0F172A;--text-sec:#475569;--text-mute:#94A3B8;
  --border:#E8E0D8;--border-light:#F3EDE6;
  --card:#FFFFFF;
  --shadow-xs:0 1px 2px rgba(15,23,42,0.04);
  --shadow-sm:0 1px 3px rgba(15,23,42,0.06),0 1px 2px rgba(15,23,42,0.04);
  --shadow-md:0 4px 12px rgba(15,23,42,0.08);
  --shadow-lg:0 12px 32px rgba(15,23,42,0.12);
}
body{background:#D6CFC6;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text)}
.phone{width:393px;height:852px;background:var(--warm-bg);border-radius:52px;border:6px solid var(--navy);overflow:hidden;position:relative;box-shadow:var(--shadow-lg),0 0 0 2px #334155,0 0 80px rgba(255,107,53,0.08)}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:128px;height:35px;background:var(--navy);border-radius:0 0 22px 22px;z-index:200}
.sbar{height:56px;padding:14px 28px 0;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700;z-index:100;color:var(--text)}
.scr{height:calc(100% - 56px - 70px);overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
.scr::-webkit-scrollbar{display:none}
.bnav{height:70px;background:rgba(255,252,248,0.94);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding-bottom:8px;z-index:100}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:600;color:var(--text-mute);cursor:pointer;background:none;border:none;padding:4px 10px;transition:all .2s}
.ni.a{color:var(--saffron)}
.ni .dot{width:5px;height:5px;border-radius:50%;background:var(--saffron);margin-top:1px}

/* Splash */
.splash{position:absolute;inset:0;z-index:300;background:linear-gradient(160deg,#FFF 0%,var(--saffron-light) 30%,var(--saffron-mid) 70%,#FFDBC4 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity .8s cubic-bezier(.4,0,.2,1),transform .8s cubic-bezier(.4,0,.2,1)}
.splash.out{opacity:0;transform:scale(1.08);pointer-events:none}
.splash-chakra{width:60px;height:60px;border:3px solid var(--saffron);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;position:relative}
.splash-chakra::before{content:'';position:absolute;width:40px;height:40px;border:2px dashed rgba(255,107,53,0.3);border-radius:50%;animation:chakra 8s linear infinite}
.splash-chakra::after{content:'';position:absolute;width:8px;height:8px;background:var(--saffron);border-radius:50%}
@keyframes chakra{to{transform:rotate(360deg)}}
.spin{width:28px;height:28px;border-radius:50%;border:2.5px solid var(--saffron-mid);border-top-color:var(--saffron);animation:sp .7s linear infinite;margin-top:28px}
@keyframes sp{to{transform:rotate(360deg)}}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
@keyframes bounceIn{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes glow{0%,100%{box-shadow:0 0 4px rgba(255,107,53,0.2)}50%{box-shadow:0 0 16px rgba(255,107,53,0.4)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes confetti-fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(300px) rotate(720deg);opacity:0}}
@keyframes score-ring{from{stroke-dashoffset:440}to{stroke-dashoffset:var(--final-offset)}}
@keyframes bar-grow{from{width:0}to{width:var(--bar-w)}}
.anim-item{animation:fadeUp .4s ease both}
.anim-item:nth-child(1){animation-delay:.05s}.anim-item:nth-child(2){animation-delay:.1s}.anim-item:nth-child(3){animation-delay:.12s}.anim-item:nth-child(4){animation-delay:.16s}.anim-item:nth-child(5){animation-delay:.2s}
.bounce{animation:bounceIn .4s ease}

/* Header */
.hdr{padding:4px 20px 14px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--saffron),#E85D2A);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ha{display:flex;gap:8px}
.hb{width:38px;height:38px;border-radius:13px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;box-shadow:var(--shadow-xs);transition:all .15s}
.hb:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
.hb .bg{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;border-radius:9px;background:var(--red);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--warm-bg)}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin:0 16px 10px;box-shadow:var(--shadow-sm);transition:all .15s}
.card:hover{box-shadow:var(--shadow-md)}
.cs{background:linear-gradient(135deg,var(--saffron-light),#FFF8F2);border-color:var(--saffron-mid);position:relative;overflow:hidden}
.cs::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:radial-gradient(circle,rgba(255,107,53,0.08),transparent);border-radius:50%}
.cn{background:linear-gradient(135deg,var(--navy),var(--navy-mid));border:none;color:#fff}
.cai{background:linear-gradient(135deg,var(--purple-light),#EDE9FE);border-color:#DDD6FE;position:relative}
.cai::after{content:'';position:absolute;top:0;right:0;bottom:0;width:40%;background:linear-gradient(90deg,transparent,rgba(124,58,237,0.03))}
.ct{font-size:11px;font-weight:700;color:var(--text-mute);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ct::before{content:'';width:3px;height:12px;background:var(--saffron);border-radius:2px}

/* Stats */
.stats{display:flex;gap:8px;margin:0 16px 10px}
.st{flex:1;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 12px;text-align:center;box-shadow:var(--shadow-xs);position:relative;overflow:hidden}
.st::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 16px 16px}
.sv{font-size:22px;font-weight:800;font-family:'JetBrains Mono'}
.sl{font-size:9px;font-weight:700;color:var(--text-mute);margin-top:3px;text-transform:uppercase;letter-spacing:.6px}

/* Section */
.sec{font-size:11px;font-weight:700;color:var(--text-mute);text-transform:uppercase;letter-spacing:1.8px;padding:12px 20px 8px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.back{background:none;border:none;color:var(--saffron);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;padding:8px 16px;font-family:'Plus Jakarta Sans';transition:all .15s}
.back:hover{gap:8px}

/* Feed */
.fi{padding:16px;margin:0 16px 8px;background:var(--card);border:1px solid var(--border);border-radius:16px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-xs);position:relative}
.fi:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.fi:active{transform:scale(.985)}
.fi-bar{position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:0 3px 3px 0}

/* Buttons */
.fab{position:absolute;bottom:80px;right:20px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--saffron),#E85D2A);border:none;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;box-shadow:0 6px 24px rgba(255,107,53,0.4),0 0 0 4px rgba(255,107,53,0.1);z-index:50;transition:all .2s}
.fab:hover{transform:scale(1.1);box-shadow:0 8px 32px rgba(255,107,53,0.5)}
.vb{display:inline-flex;align-items:center;gap:2px;font-size:9px;font-weight:700;color:var(--blue);background:var(--blue-light);padding:2px 7px;border-radius:6px;margin-left:4px}
.ib{display:inline-flex;align-items:center;gap:2px;font-size:9px;font-weight:700;color:var(--amber);background:var(--amber-light);padding:2px 7px;border-radius:6px;margin-left:4px}
.act{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--text-mute);background:none;border:none;cursor:pointer;padding:3px 4px;font-family:'Plus Jakarta Sans';transition:all .15s;border-radius:6px}
.act:hover{background:var(--saffron-light);color:var(--saffron)}
.act.on{color:var(--saffron)}
.btn{width:100%;padding:15px;margin-top:16px;background:linear-gradient(135deg,var(--saffron),#E85D2A);border:none;border-radius:14px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;font-family:'Plus Jakarta Sans';box-shadow:0 4px 16px rgba(255,107,53,0.3);transition:all .2s;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);background-size:200% 100%;animation:shimmer 3s ease infinite}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,53,0.4)}
.btn:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
.btn:disabled::after{display:none}
.tb{display:flex;gap:4px;padding:0 16px;margin-bottom:10px}
.tbtn{flex:1;padding:8px;border-radius:10px;background:var(--card);border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-mute);cursor:pointer;text-align:center;font-family:'Plus Jakarta Sans';transition:all .15s}
.tbtn.a{background:var(--saffron-light);border-color:var(--saffron);color:var(--saffron);box-shadow:0 2px 8px rgba(255,107,53,0.15)}

/* Map */
.map-box{margin:0 16px;height:260px;border-radius:18px;background:linear-gradient(145deg,#E8F4FD,#F0F7FF,#E0EFFF);border:1px solid var(--border);position:relative;overflow:hidden;box-shadow:var(--shadow-sm)}
.map-area{position:absolute;border-radius:40%;opacity:.15}
.map-pin{position:absolute;width:14px;height:14px;border-radius:50%;border:2.5px solid white;transform:translate(-50%,-50%);cursor:pointer;transition:all .2s;box-shadow:0 2px 6px rgba(0,0,0,0.25)}
.map-pin:hover{transform:translate(-50%,-50%) scale(1.6);z-index:10}
.map-pin::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid currentColor;opacity:0;animation:map-pulse 2s ease infinite}
@keyframes map-pulse{0%,100%{opacity:0;transform:scale(1)}50%{opacity:.3;transform:scale(1.5)}}

/* Before/After slider */
.ba-container{position:relative;width:100%;height:120px;border-radius:12px;overflow:hidden;cursor:ew-resize;user-select:none;margin-top:10px}
.ba-img{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.ba-before{background:linear-gradient(135deg,#FEE2E2,#FECACA);color:var(--red);clip-path:inset(0 var(--clip-right) 0 0);z-index:2}
.ba-after{background:linear-gradient(135deg,#D1FAE5,#A7F3D0);color:var(--green);z-index:1}
.ba-line{position:absolute;top:0;bottom:0;width:3px;background:white;z-index:3;box-shadow:0 0 8px rgba(0,0,0,0.3)}
.ba-handle{position:absolute;top:50%;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;background:white;z-index:4;box-shadow:0 2px 8px rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center}

/* Confetti */
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;animation:confetti-fall 2.5s ease forwards}

/* Sparkline */
.sparkline{display:inline-block;vertical-align:middle;margin-left:6px}
</style>
</head>

const Sparkline=({data,color="#FF6B35",w=60,h=18})=>{const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v/Math.max(...data))*h)}`).join(" ");return <svg width={w} height={h} className="sparkline"><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5"/><circle cx={(data.length-1)/(data.length-1)*w} cy={h-((data[data.length-1]/Math.max(...data))*h)} r="2" fill={color}/></svg>};

const AnimCounter=({end,dur=1200,prefix="",suffix=""})=>{const[val,setVal]=useState(0);const ref=useRef();useEffect(()=>{let start=0;const step=ts=>{if(!ref.current)ref.current=ts;const p=Math.min((ts-ref.current)/dur,1);setVal(Math.floor(p*end));if(p<1)requestAnimationFrame(step)};requestAnimationFrame(step);return ()=>{ref.current=null}},[end,dur]);return <span>{prefix}{val.toLocaleString()}{suffix}</span>};

const BeforeAfter=()=>{const[pos,setPos]=useState(50);const ref=useRef(null);const move=useCallback(e=>{if(!ref.current)return;const r=ref.current.getBoundingClientRect();const x=((e.clientX||e.touches?.[0]?.clientX||0)-r.left)/r.width*100;setPos(Math.max(5,Math.min(95,x)))},[]);
return <div ref={ref} className="ba-container" onMouseMove={e=>{if(e.buttons===1)move(e)}} onTouchMove={e=>move(e)}>
  <div className="ba-before" style={{"--clip-right":(100-pos)+"%"}}>
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#DC2626" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <span>BEFORE</span><span style={{fontSize:10,fontWeight:400}}>Pothole · 2ft deep</span>
    </div>
  </div>
  <div className="ba-after">
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#059669" strokeWidth="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span>AFTER</span><span style={{fontSize:10,fontWeight:400}}>Repaired · Asphalt laid</span>
    </div>
  </div>
  <div className="ba-line" style={{left:pos+"%"}}/>
  <div className="ba-handle" style={{left:pos+"%"}}>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="2"><polyline points="9 18 15 12 9 6"/><polyline points="15 18 9 12 15 6"/></svg>
  </div>
</div>};

const Confetti=()=>{const colors=["#FF6B35","#2563EB","#059669","#F59E0B","#7C3AED","#DC2626","#0D9488"];return <div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"hidden"}}>
  {Array(24).fill(0).map((_,i)=><div key={i} className="confetti-piece" style={{left:Math.random()*100+"%",top:-10,background:colors[i%colors.length],animationDelay:Math.random()*1.5+"s",animationDuration:(2+Math.random()*1.5)+"s",width:4+Math.random()*6,height:4+Math.random()*6,borderRadius:Math.random()>.5?"50%":"2px",transform:`rotate(${Math.random()*360}deg)`}}/>)}
</div>};

const Stars=({rating,size=14})=>{const f=Math.floor(rating);const e=5-f;return <span style={{display:"flex",gap:1}}>{Array(f).fill(0).map((_,i)=><span key={`f${i}`}>{I.star("#F59E0B",size)}</span>)}{Array(e).fill(0).map((_,i)=><span key={`e${i}`}>{I.starEmpty("#D1D5DB",size)}</span>)}</span>};

const Hl=({text})=><>{text.split(/(#\w+|@\w+)/g).map((p,i)=>p.startsWith("#")?<span key={i} style={{color:"#2563EB",fontWeight:600}}>{p}</span>:p.startsWith("@")?<span key={i} style={{color:"#FF6B35",fontWeight:600}}>{p}</span>:<span key={i}>{p}</span>)}</>;

const ScoreRing=({score,size=150})=>{const r=65;const c=2*Math.PI*r;const offset=c-(score/100)*c;
return <svg width={size} height={size} viewBox="0 0 150 150" style={{transform:"rotate(-90deg)"}}>
  <circle cx="75" cy="75" r={r} fill="none" stroke="#F3EDE6" strokeWidth="10"/>
  <circle cx="75" cy="75" r={r} fill="none" stroke="url(#scoreGrad)" strokeWidth="10" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset} style={{transition:"stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1)"}}/>
  <defs><linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#FF6B35"/><stop offset="100%" stopColor="#F59E0B"/></linearGradient></defs>
</svg>};

      <div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>Top 5% in Ward 27</div>
    </div>
    <div className="stats">{[{v:23,l:"Filed",c:"#059669"},{v:19,l:"Resolved",c:"#2563EB"},{v:"96%",l:"Accuracy",c:"#D97706"}].map((s,i)=><div key={i} className="st"><div className="sv" style={{color:s.c,fontSize:17}}>{typeof s.v==="number"?<AnimCounter end={s.v} dur={800}/>:s.v}</div><div className="sl">{s.l}</div></div>)}</div>
    <div className="card"><div className="ct">Score Factors</div>{[{l:"Verified Reports",v:"+340",c:"#059669"},{l:"Community Validations",v:"+280",c:"#059669"},{l:"Helpful Updates",v:"+180",c:"#059669"},{l:"Govt Confirmations",v:"+120",c:"#2563EB"},{l:"One False Report",v:"-73",c:"#DC2626"}].map((f,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<4?"1px solid var(--border-light)":"none",fontSize:13}}><span style={{color:"#475569"}}>{f.l}</span><span style={{fontWeight:700,fontFamily:"'JetBrains Mono'",color:f.c}}>{f.v}</span></div>)}</div>
    <div className="card"><div className="ct">Verification</div>{[{l:"Aadhaar KYC",s:"Verified"},{l:"Phone",s:"+91 98XXX XXX42"},{l:"Address",s:"Ward 27, Andheri East"},{l:"DigiLocker",s:"Connected"}].map((v,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<3?"1px solid var(--border-light)":"none",fontSize:12}}><span style={{color:"#475569"}}>{v.l}</span><span style={{color:"#059669",fontWeight:600}}>✓ {v.s}</span></div>)}</div>
    <div className="card"><div className="ct">Influence & Social Proof</div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"8px 0",borderBottom:"1px solid var(--border-light)"}}><span style={{color:"#475569"}}>Influence Score</span><span style={{fontWeight:700,fontFamily:"'JetBrains Mono'",color:"var(--saffron)"}}>92 / 100</span></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"8px 0",borderBottom:"1px solid var(--border-light)"}}><span style={{color:"#475569"}}>Followers</span><span style={{fontWeight:700,fontFamily:"'JetBrains Mono'"}}>12,847</span></div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"8px 0"}}><span style={{color:"#475569"}}>People's Champion Eligible</span><span style={{fontWeight:700,color:"#D97706"}}>87.2K more needed</span></div>
    </div>
  </>;

  // ── NOTIFICATIONS ──
  const NotifScreen=()=><><div className="hdr"><h1>Updates</h1></div>
    {NOTIFS.map((n,i)=><div key={n.id} className="anim-item" style={{display:"flex",gap:12,padding:14,margin:"0 16px 6px",background:"#fff",border:"1px solid var(--border)",borderRadius:16,boxShadow:"var(--shadow-xs)"}}>
      <div style={{width:38,height:38,borderRadius:12,background:n.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I[n.icon]&&I[n.icon](n.c,18)}</div>
      <div><div style={{fontSize:13,lineHeight:1.4,color:"#475569"}}>{n.text}</div><div style={{fontSize:10,color:"#94A3B8",marginTop:3}}>{n.time}</div></div>
    </div>)}
  </>;

  // ── RESOLVED (Before/After detail) ──
  const ResolvedScreen=()=><><button className="back" onClick={()=>setSub(null)}>{I.chevLeft("#FF6B35")} Back</button>
    <div className="card cs"><div style={{fontSize:16,fontWeight:700}}>Water leak — Versova Metro</div><div style={{fontSize:12,color:"#059669",fontWeight:600,marginTop:4}}>✓ Citizen Verified · Resolved</div></div>
    <div className="sec">Before / After Comparison</div>
    <div style={{padding:"0 16px"}}><BeforeAfter/></div>
    <div className="sec" style={{marginTop:12}}>Resolution Timeline</div>
    <div className="card"><div style={{fontSize:12,color:"#475569"}}>Reported → Resolved in <strong style={{color:"var(--saffron)"}}>2.3 days</strong></div><div style={{fontSize:11,color:"#94A3B8",marginTop:4}}>Ward Councillor Priya Sharma responded within 2 hours</div></div>
    <button style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,margin:"8px 16px",padding:"12px",borderRadius:14,background:"var(--blue-light)",border:"1px solid #BFDBFE",color:"#2563EB",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'Plus Jakarta Sans'",width:"calc(100% - 32px)"}}>{I.share("#2563EB",16)} Share this civic win</button>
  </>;

  // ── ROUTER ──
  const renderScreen=()=>{
    if(sub==="leader") return <Leader/>;
    if(sub==="ledger") return <LedgerScreen/>;
    if(sub==="resolved") return <ResolvedScreen/>;
    if(sub==="chi") return <CHIScreen/>;
    if(sub==="promises") return <PromisesScreen/>;
    if(sub==="profile") return <ProfileScreen/>;
    if(sub==="ldash") return <LDash/>;
    switch(tab){
      case "home": return <Home/>;
      case "report": return <Report/>;
      case "reps": return <Reps/>;
      case "map": return <Map/>;
      case "trending": return <TrendingScreen/>;
      case "polls": return <PollsScreen/>;
      case "dm": return <DMScreen/>;
      case "search": return <SearchScreen/>;
      case "notif": return <NotifScreen/>;
      default: return <Home/>;
    }
  };

  const NAV=[{id:"home",ic:"home",l:"Home"},{id:"report",ic:"report",l:"Report"},{id:"reps",ic:"leaders",l:"Leaders"},{id:"map",ic:"map",l:"Map"},{id:"trending",ic:"trending",l:"Trending"}];

  return <div style={{display:"flex",justifyContent:"center",alignItems:"center",minHeight:"100vh"}}>
    <div className="phone">
      <div className="notch"/>
      <div className="sbar"><span>9:41</span><span style={{display:"flex",gap:6,alignItems:"center",fontSize:10}}>5G 📶 🔋</span></div>
      <div className={"splash"+(splash?"":" out")}>
        <div className="splash-chakra"/>
        <div style={{fontSize:48,fontWeight:800,background:"linear-gradient(135deg,#FF6B35,#E85D2A)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:-2}}>Civitro</div>
        <div style={{fontSize:12,color:"#475569",marginTop:6,letterSpacing:3,textTransform:"uppercase",fontWeight:600}}>Civic Intelligence</div>
        <div style={{fontSize:11,color:"#94A3B8",marginTop:20,fontStyle:"italic"}}>"Democracy you can see"</div>
        <div className="spin"/>
      </div>
      <div className="scr" ref={ref}>{renderScreen()}<div style={{height:20}}/></div>
      {tab!=="report"&&!sub&&<button className="fab" onClick={()=>go("report")}>{I.plus("#fff",24)}</button>}
      <div className="bnav">{NAV.map(n=><button key={n.id} className={"ni"+(tab===n.id&&!sub?" a":"")} onClick={()=>go(n.id)}>
        <span>{I[n.ic](tab===n.id&&!sub?"#FF6B35":"#94A3B8",20)}</span><span>{n.l}</span>{tab===n.id&&!sub&&<div className="dot"/>}
      </button>)}</div>
    </div>
  </div>;
}

ReactDOM.render(React.createElement(Civitro), document.getElementById('root'));
</script>
</body>
</html>
