syntax = "proto3";
package civitro.common;
option go_package = "github.com/civitro/proto/common";

message Timestamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

message LatLng {
  double latitude = 1;
  double longitude = 2;
}

message Pagination {
  int32 page = 1;
  int32 limit = 2;
  string cursor = 3;
}

message PaginatedResponse {
  int32 total = 1;
  int32 page = 2;
  int32 limit = 3;
  string next_cursor = 4;
}

message Empty {}

message IDRequest {
  string id = 1;
}

message StatusResponse {
  bool success = 1;
  string message = 2;
}
