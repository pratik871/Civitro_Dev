syntax = "proto3";
package civitro.identity;
option go_package = "github.com/civitro/proto/identity";

import "common/common.proto";

service IdentityService {
  rpc GetUser(civitro.common.IDRequest) returns (UserResponse);
  rpc GetUserByPhone(PhoneRequest) returns (UserResponse);
  rpc ValidateToken(TokenRequest) returns (TokenValidation);
}

message PhoneRequest {
  string phone = 1;
}

message TokenRequest {
  string token = 1;
}

message TokenValidation {
  string user_id = 1;
  string verification_level = 2;
  bool valid = 3;
}

message UserResponse {
  string id = 1;
  string phone = 2;
  string name = 3;
  string email = 4;
  string verification_level = 5;
  civitro.common.Timestamp created_at = 6;
}
